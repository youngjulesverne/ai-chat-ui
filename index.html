<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat UI</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="chat">
      <header class="chat__header">AI Chat</header>

      <section
        id="messages"
        class="chat__messages"
        aria-label="Messages"
      ></section>

      <form id="chatForm" class="chat__input" autocomplete="off">
        <input
          id="messageInput"
          type="text"
          placeholder="Type a message..."
          aria-label="Message"
          required
        />
        <button id="sendButton" type="submit">Send</button>
      </form>
    </main>

    <script src="app.js"></script>
  </body>
</html>
