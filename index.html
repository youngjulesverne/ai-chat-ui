<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="h-screen bg-zinc-950 text-zinc-100">
    <div class="flex h-screen">
      <aside class="w-72 border-r border-zinc-800 bg-zinc-950 p-4">
        <button
          class="w-full rounded-xl bg-zinc-100 px-4 py-2 text-sm font-semibold text-zinc-900 hover:bg-white"
          type="button"
        >
          + New Chat
        </button>

        <div class="mt-6 space-y-2">
          <p
            class="text-xs font-semibold uppercase tracking-wide text-zinc-400"
          >
            Conversations
          </p>

          <button
            type="button"
            class="w-full rounded-xl border border-zinc-800 bg-zinc-900 px-3 py-3 text-left hover:bg-zinc-800"
            aria-current="true"
          >
            <div class="text-sm font-semibold">Kanye West's best song</div>
            <div class="text-xs text-zinc-400">Active conversation</div>
          </button>

          <button
            type="button"
            class="w-full rounded-xl border border-zinc-800 bg-zinc-950 px-3 py-3 text-left hover:bg-zinc-900"
          >
            <div class="text-sm font-semibold">Money Laundering ideas</div>
            <div class="text-xs text-zinc-400">Yesterday</div>
          </button>
        </div>
      </aside>

      <main class="flex flex-1 flex-col">
        <header class="border-b border-zinc-800 bg-zinc-950 px-6 py-4">
          <h1 class="text-sm font-semibold">AI Chat</h1>
          <p class="text-xs text-zinc-400">Static UI (Tailwind)</p>
        </header>

        <section
          id="messages"
          class="flex-1 space-y-4 overflow-y-auto px-6 py-6"
          aria-label="Messages"
        >
          <chat-message role="ai">
            Hey there! Just ask me a question i am ready to answer.
          </chat-message>

          <chat-message role="user"> What is Kanye's best song? </chat-message>

          <chat-message role="ai">
            It is definitely Family Business !
          </chat-message>
        </section>

        <footer class="border-t border-zinc-800 bg-zinc-950 p-4">
          <form
            id="chatForm"
            class="mx-auto flex max-w-3xl items-end gap-3"
            autocomplete="off"
          >
            <label class="sr-only" for="messageInput">Message</label>
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Type a message..."
              class="max-h-40 min-h-[44px] flex-1 resize-none rounded-2xl border border-zinc-800 bg-zinc-900 px-4 py-3 text-sm text-zinc-100 placeholder:text-zinc-500 focus:outline-none focus:ring-2 focus:ring-zinc-600"
              required
            ></textarea>

            <button
              id="sendButton"
              type="submit"
              class="h-[44px] rounded-2xl bg-zinc-100 px-4 text-sm font-semibold text-zinc-900 hover:bg-white"
            >
              Send
            </button>
          </form>

          <p class="mt-3 text-center text-xs text-zinc-500"></p>
        </footer>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
